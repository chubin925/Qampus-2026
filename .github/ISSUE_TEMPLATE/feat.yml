name: Feat
description: 새로운 기능 개발 시 해당 이슈템플릿을 사용해주세요.
title: "Feat/ "
labels: ["feat"]
assignees: []

body:
  - type: textarea
    id: summary
    attributes:
      label: ✨ 기능 설명
      description: 추가할 기능을 간단히 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: ✅ 작업 목록
      description: 해야 할 작업을 체크리스트로 작성해주세요.
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 📌 참고 사항
      description: 참고할 디자인, API, 문서, 관련 이슈가 있다면 적어주세요.
    validations:
      required: false
name: Fix
description: 버그가 생겼을 시에는 해당 이슈템플릿을 사용해주세요.
title: "Fix/ "
labels: ["fix"]
assignees: []

body:
  - type: textarea
    id: problem
    attributes:
      label: 🐛 문제 상황
      description: 어떤 문제가 발생했는지 설명해주세요.
      placeholder: 예) 로그인 버튼 클릭 시 메인 페이지로 이동하지 않음
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: ✅ 작업 목록
      description: 수정해야 할 작업을 체크리스트로 작성해주세요.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 📌 참고 사항
      description: 관련 파일, 브랜치, 이슈 번호 등이 있다면 작성해주세요.
      placeholder: 예) accounts/views.py, login.html 관련
    validations:
      required: false
name: Refactor
description: 기존의 코드를 수정 및 개선할 경우에는 해당 이슈템플릿을 사용해주세요.
title: "Refactor/ "
labels: ["refactor"]
assignees: []

body:
  - type: textarea
    id: summary
    attributes:
      label: ♻️ 리팩토링 설명
      description: 어떤 부분을 개선할지 설명해주세요.
      placeholder: 예) 중복된 템플릿 코드를 공통 컴포넌트로 분리
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 💡 리팩토링 이유
      description: 왜 리팩토링이 필요한지 작성해주세요.
      placeholder: 예) 코드 중복 제거, 유지보수성 개선, 가독성 향상
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: ✅ 작업 목록
      description: 리팩토링할 작업을 체크리스트로 작성해주세요.
      value: |
        - [ ] 
        - [ ]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 📌 참고 사항
      description: 기능 변경 여부, 테스트 필요 사항 등을 작성해주세요.
      placeholder: 예) 기존 동작은 유지해야 함
    validations:
      required: false